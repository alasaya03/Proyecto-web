<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petify - Bienvenida</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;800&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Urbanist', sans-serif;
    height:100vh;
    background: linear-gradient(135deg,#d0e7ff,#a0d4ff);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#0c0f16;
    overflow:hidden;
}

.logo-container {
    text-align:center;
    position:relative;
    z-index:2;
}

.welcome-text {
    font-size:32px;
    font-weight:600;
    margin-bottom:20px;
    color:#0077c2;
    animation:fadeIn 1.5s ease forwards;
}

.logo {
    width:250px;
    height:250px;
    margin:0 auto 40px auto;
    background: url('imagenes/logo.png') no-repeat center center;
    background-size: contain;
    animation:logoFloat 2.5s ease-in-out infinite;
    border-radius: 20px;
}

.overlay {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding-bottom:80px;
    z-index:1;
}

.button-container {
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
    animation:fadeInUp 2s ease forwards;
}

.btn {
    padding:18px 40px;
    border-radius:12px;
    border:none;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition: all 0.4s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.btn-login {
    background: linear-gradient(90deg,#2196f3,#64b5f6);
    color:#fff;
}

.btn-login:hover {
    transform: scale(1.1);
    box-shadow:0 12px 30px rgba(33,150,243,0.5);
}

.btn-signup {
    background: linear-gradient(90deg,#42a5f5,#90caf9);
    color:#fff;
}

.btn-signup:hover {
    transform: scale(1.1);
    box-shadow:0 12px 30px rgba(66,165,245,0.5);
}

@keyframes logoFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

@keyframes fadeIn {
    from { opacity:0; transform: translateY(-20px); }
    to { opacity:1; transform: translateY(0); }
}

@keyframes fadeInUp {
    from { opacity:0; transform: translateY(40px); }
    to { opacity:1; transform: translateY(0); }
}

body::before {
    content:'';
    position:absolute;
    width:100%; height:100%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
    background-size:25px 25px;
    top:0; left:0;
    z-index:0;
    animation:moveParticles 60s linear infinite;
}

@keyframes moveParticles {
    from { background-position: 0 0; }
    to { background-position: 600px 600px; }
}
</style>
</head>
<body>

<div class="logo-container">
    <div class="welcome-text">Bienvenid@ a</div>
    <div class="logo"></div>       
</div>

<div class="overlay">  
    <div class="button-container">
        <a href="iniciosesion.html"><button class="btn btn-login">Iniciar Sesión</button></a>
        <a href="registro.html"><button class="btn btn-signup">Registrarte</button></a>
    </div>
</div>

</body>
</html>
