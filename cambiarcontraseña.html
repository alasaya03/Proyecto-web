<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña</title>
    <link rel="stylesheet" href="iniciosesion.css">
</head>
<body>

    <div class="contenedor">
        <form action="cambiarcontraseña.jsp" method="post">

            <h1>Restablecer Contraseña</h1>

            <input type="email" placeholder="Correo registrado" class="campo" name="correo" required><br>

            <input type="password" placeholder="Nueva contraseña" class="campo" name="contra" required><br>

            <input type="password" placeholder="Repetir contraseña" class="campo" name="contra2" required><br>

            <button type="submit" class="btn btn-principal">Guardar contraseña</button>

        </form>
    </div>

</body>
</html>
